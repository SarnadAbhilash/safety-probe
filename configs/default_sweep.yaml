# Default sweep configuration
# Run with: safety-probe sweep --model <model_id> --config configs/default_sweep.yaml

base:
  max_new_tokens: 256
  repetition_penalty: 1.0
  sampling_strategy: "multinomial"
  seed: 42

grid:
  temperature: [0.0, 0.3, 0.5, 0.7, 1.0, 1.2, 1.5, 2.0]
  top_p: [0.9, 0.95, 1.0]
